service: serverless-contact-form

frameworkVersion: '4'

useDotenv: true

custom:
  secrets: ${file(secrets.json), {}}
  esbuild:
    bundle: true
    minify: true
    sourcemap: true
    exclude: ['aws-sdk']
    target: 'node20'
    platform: 'node'
    concurrency: 10

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${env:AWS_REGION, 'us-east-1'}
  timeout: 30
  memorySize: 256
  tracing:
    lambda: true
  environment:
    NODE_ENV: ${self:provider.stage}
    EMAIL: ${env:EMAIL, self:custom.secrets.EMAIL}
    DOMAIN: ${env:DOMAIN, self:custom.secrets.DOMAIN}
    AWS_REGION: ${self:provider.region}
    RATE_LIMIT_MAX_REQUESTS: ${env:RATE_LIMIT_MAX_REQUESTS, self:custom.secrets.RATE_LIMIT_MAX_REQUESTS, '5'}
    RATE_LIMIT_WINDOW_MS: ${env:RATE_LIMIT_WINDOW_MS, self:custom.secrets.RATE_LIMIT_WINDOW_MS, '60000'}
    RATE_LIMIT_TABLE: ${env:RATE_LIMIT_TABLE, self:custom.secrets.RATE_LIMIT_TABLE, ''}
    RATE_LIMIT_PARTITION_KEY: ${env:RATE_LIMIT_PARTITION_KEY, self:custom.secrets.RATE_LIMIT_PARTITION_KEY, 'id'}
    RATE_LIMIT_FAIL_OPEN: ${env:RATE_LIMIT_FAIL_OPEN, self:custom.secrets.RATE_LIMIT_FAIL_OPEN, 'true'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: "*"
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"
        - Effect: Allow
          Action:
            - dynamodb:UpdateItem
          # Set RATE_LIMIT_TABLE_ARN to scope this to your specific table
          Resource: "${env:RATE_LIMIT_TABLE_ARN, self:custom.secrets.RATE_LIMIT_TABLE_ARN, '*'}"
  logs:
    restApi: true

plugins:
  - serverless-esbuild
  - serverless-offline

functions:
  send:
    handler: src/handler.send
    description: 'Handles contact form submissions via email'
    events:
      - http:
          path: contact
          method: post
          cors:
            origin: ${env:DOMAIN, self:custom.secrets.DOMAIN, '*'}
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
      - http:
          path: contact
          method: options
          cors:
            origin: ${env:DOMAIN, self:custom.secrets.DOMAIN, '*'}
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

package:
  patterns:
    - '!node_modules/**'
    - '!src/**'
    - '!.git/**'
    - '!.vscode/**'
    - '!tests/**'
    - '!*.md'
    - '!tsconfig.json'
    - '!.eslintrc.js'
    - '!prettier.config.js'
